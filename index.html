<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Chatbot (with Voice)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="chat-container">
    <div class="chat-box" id="chat-box">
      <div class="bot-msg">Hi! 👋 I’m your School Assistant Chatbot. How can I help?</div>
    </div>

    <div class="input-area">
      <button id="mic-btn" title="Speak"><span>🎤</span></button>
      <input type="text" id="user-input" placeholder="Type or speak..." autofocus />
      <button onclick="sendMessage()">Send</button>
    </div>

    <div class="options">
      <label><input type="checkbox" id="voice-toggle" checked> Enable voice output</label>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
