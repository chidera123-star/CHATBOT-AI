<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>School Chatbot</title>
    <style>
        body { font-family: Arial; background-color: #f2f2f2; text-align: center; margin: 0; padding: 0; }
        h1 { background-color: #003366; color: #fff; padding: 20px 0; }
        #chat-container { width: 60%; margin: 40px auto; background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        #chat-box { height: 400px; overflow-y: auto; text-align: left; padding: 10px; border: 1px solid #ddd; }
        .message { margin: 10px 0; }
        .user { color: #003366; }
        .bot { color: #008000; }
        #input-container { margin-top: 15px; }
        input { width: 75%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; }
        button { padding: 8px 12px; margin-left: 10px; border: none; border-radius: 4px; background: #003366; color: #fff; cursor: pointer; }
        button:hover { background: #004080; }
    </style>
</head>
<body>
    <h1>🎓 School Assistant Chatbot</h1>
    <div id="chat-container">
        <div id="chat-box"></div>
        <div id="input-container">
            <input id="user-input" placeholder="Ask about subjects, timings, uniform..." />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const message = document.getElementById("user-input").value;
            if (!message.trim()) return;
            addMessage("user", message);
            document.getElementById("user-input").value = "";

            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message })
            });
            const data = await response.json();
            addMessage("bot", data.response);
            speak(data.response); // Voice output
        }

        function addMessage(sender, text) {
            const box = document.getElementById("chat-box");
            box.innerHTML += `<div class='message ${sender}'><b>${sender === "user" ? "You" : "Bot"}:</b> ${text}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        // Voice Output
        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = "en-US";
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
